<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-card" id="weatherCard">
        <div class="card-visual-side" id="cardImageSide"></div>
        
        <div class="card-info-side">
            <span class="status-badge" id="cardBadge">Weather</span>
            <h1 id="cardTitle">Title</h1>
            <h3 id="cardSubtitle">Subtitle</h3>
            <p id="cardDesc">Description text goes here.</p>
            
            <div class="detail-row" id="detailTags"></div>

            <div class="action-row">
                <button class="nav-btn btn-outline" id="leftBtn">Overview</button>
                <button class="nav-btn btn-filled" id="rightBtn">Proceed</button>
            </div>
        </div>
    </div>

    <div class="error-box" id="errorPage">
    <h1 style="font-size: 3rem; margin-bottom: 10px;">Oops! 🫙</h1>
    <p style="font-size: 1.2rem; margin-bottom: 20px;">404: Page Not Found</p>
    <img src="https://media3.giphy.com/media/v1.Y2lkPTZjMDliOTUyNnoycDZ3aWdtNXIxbm9ncXhqcGdxY2hlMmM4dWFhdmgzZWV0YWloMiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/14uQ3cOFteDaU/200w.gif" alt="Funny Cat Meme" style="max-width: 300px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
</div>
    <script src="index.js"></script>



</body>
</html>
